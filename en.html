    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; overflow-x: hidden; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .hero-section {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .nav-link { color: #374151; font-weight: bold; transition: 0.3s; }
        .nav-link:hover { color: #ef4444; }
        .product-link { color: #ef4444 !important; font-weight: 800; }
        .main-logo { height: 40px; border-radius: 8px; }
        .hero-logo { height: 110px; border-radius: 15px; margin: 0 auto 20px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .service-card { transition: 0.3s; border-top: 4px solid #ef4444; background-color: white; }
        .service-card:hover { transform: translateY(-10px); }

        /* Cart Icon - Enhanced Style */
        .cart-icon { 
            color: #ef4444; 
            font-size: 22px; 
            position: relative; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center;
            padding: 8px;
            border-radius: 50%;
        }
        .cart-icon:hover { 
            background-color: rgba(239, 68, 68, 0.1);
            transform: scale(1.15); 
        }

        /* Mobile Menu Adjustments */
        @media (min-width: 769px) {
            #mobile-menu { display: flex !important; position: static; background: none; box-shadow: none; width: auto; padding: 0; flex-direction: row; }
            .burger-icon { display: none !important; }
        }

        @media (max-width: 768px) {
            #mobile-menu { 
                display: none; 
                flex-direction: column; 
                width: 35%; 
                position: fixed; 
                top: 64px; 
                right: 0; 
                height: 65vh; 
                background: rgba(45, 45, 48, 0.97); 
                backdrop-filter: blur(12px);
                padding: 10px 5px; 
                box-shadow: -5px 5px 15px rgba(0,0,0,0.3); 
                z-index: 9999; 
                border-left: 2px solid #ef4444;
                border-bottom-left-radius: 20px;
                overflow-y: auto;
            }
            #mobile-menu.active { display: flex !important; animation: slideInRight 0.4s ease-out; }
            .nav-link, .product-link { 
                padding: 6px 8px; 
                border-bottom: 1px solid rgba(255,255,255,0.05); 
                width: 100%; 
                text-align: left; 
                color: white !important;
                font-size: 14px;
                white-space: nowrap; 
            }
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366; color: #FFF;
            border-radius: 50px; text-align: center; font-size: 30px; box-shadow: 2px 2px 3px #999; z-index: 1001;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
    </style>
