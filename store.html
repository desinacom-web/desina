<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر DeSina | التشكيلة المميزة</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fcfcfc; scroll-behavior: smooth; font-style: normal !important; }
        * { font-style: normal !important; text-transform: none !important; }

        /* الشريط العلوي - حجم متوسط وشيك */
        .nav-link { font-weight: 900 !important; font-size: 15px !important; }

        /* الهيرو سيكشن - DeSina */
        .hero-section { background-color: #0f172a; padding: 30px 20px 50px; text-align: center; }
        .brand-text { font-weight: 900 !important; letter-spacing: -1px; font-size: 3.2rem; color: white; line-height: 1.2; }
        .brand-red { color: #ef4444; }

        /* محرك البحث Premium */
        .search-container { max-width: 600px; margin: -28px auto 25px; padding: 0 20px; position: relative; z-index: 10; }
        .search-bar { width: 100%; padding: 15px 55px 15px 25px; border-radius: 50px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15); outline: none; font-weight: 700; text-align: right; }
        .search-icon { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        .filter-btn { padding: 8px 25px; border-radius: 50px; background: white; border: 2px solid #eee; font-weight: 800; font-size: 14px; transition: 0.3s; }
        .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* كارت المنتج */
        .store-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #f1f5f9; transition: 0.3s; text-align: center; }
        .product-img-container { width: 100%; height: 180px; overflow: hidden; background: #f1f5f9; cursor: zoom-in; position: relative; }
        @media (min-width: 768px) { .product-img-container { height: 320px; } }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s ease; }

        /* Lightbox */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        #lightbox-img { max-width: 90%; max-height: 80vh; border-radius: 12px; }
        .lb-close { position: absolute; top: 20px; left: 25px; color: white; font-size: 45px; cursor: pointer; z-index: 10002; }
        .lb-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 45px; cursor: pointer; padding: 25px; z-index: 10002; }

        /* سيكشن التقييمات */
        .review-card { background: white; border-radius: 25px; padding: 30px; border: 1px solid #f0f0f0; margin: 10px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .star-gold { color: #fbbf24; font-size: 18px; margin-bottom: 8px; }
        .review-btn { background: #ef4444; color: white; padding: 12px 35px; border-radius: 50px; font-weight: 900; font-size: 16px; margin-bottom: 30px; transition: 0.3s; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <div id="lightbox">
        <span class="lb-close" onclick="closeLightbox()">&times;</span>
        <i class="fas fa-chevron-right lb-arrow" style="right:15px" onclick="changeImg(-1)"></i>
        <i class="fas fa-chevron-left lb-arrow" style="left:15px" onclick="changeImg(1)"></i>
        <img id="lightbox-img" src="">
    </div>

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-4">
                <img src="logo.jpg" style="height: 38px; border-radius: 8px;">
                <a href="index.html" class="nav-link text-slate-900">الرئيسية</a>
            </div>
            <div class="flex items-center gap-6">
                <a href="store-en.html" class="nav-link text-blue-600">English</a>
                <div class="text-red-600 text-2xl relative cursor-pointer" onclick="sendOrderToWhatsApp()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-badge" class="bg-black text-white rounded-full px-2 py-0.5 text-[10px] absolute -top-2 -left-2 hidden">0</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <h1 class="brand-text"><span class="brand-red">DeSina</span> Store</h1>
        <p class="text-slate-400 font-bold text-[11px] tracking-[0.4em] mt-3 uppercase">تجربة تسوق فريدة</p>
    </header>

    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن الموديل..." onkeyup="displayProducts()">
    </div>

    <div class="flex flex-wrap justify-center gap-2 mb-10 px-4">
        <button class="filter-btn active" onclick="setCategory('all', this)">كل الموديلات</button>
        <button class="filter-btn" onclick="setCategory('summer', this)">صيفي ☀️</button>
        <button class="filter-btn" onclick="setCategory('winter', this)">شتوي ❄️</button>
    </div>

    <div class="container mx-auto px-4 mb-24">
        <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8"></div>
    </div>

    <section class="bg-white py-16 px-4 border-t">
        <div class="container mx-auto max-w-5xl text-center">
            <h2 class="text-3xl md:text-5xl font-black mb-8 text-slate-900">ماذا يقول عملاء <span class="brand-red">DeSina</span> ⭐</h2>
            
            <button class="review-btn" onclick="toggleReviewModal(true)">أضف تجربتك معنا</button>

            <div class="swiper mySwiper">
                <div id="reviews-wrapper" class="swiper-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <div id="review-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:20000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div style="background:white; width:90%; max-width:400px; padding:30px; border-radius:25px; position:relative;">
            <i class="fas fa-times absolute left-6 top-6 text-gray-400 cursor-pointer text-xl" onclick="toggleReviewModal(false)"></i>
            <h3 class="text-xl font-black mb-6 text-center">أضف تقييمك</h3>
            <input type="text" id="revName" placeholder="الاسم" class="w-full border p-3 rounded-xl mb-4 font-bold outline-none text-right">
            <textarea id="revMsg" placeholder="اكتب تجربتك هنا..." class="w-full border p-3 rounded-xl h-24 mb-4 font-bold outline-none text-right"></textarea>
            <button onclick="submitReview()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black">إرسال عبر واتساب</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const totalModels = 11;
        const grid = document.getElementById('product-grid');
        let currentFilter = 'all', activeIdx = 1;

        function displayProducts() {
            grid.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            for (let i = 1; i <= totalModels; i++) {
                const modelName = `موديل COD-${i < 10 ? '0'+i : i}`;
                const category = (i % 2 === 0) ? 'winter' : 'summer';
                if ((currentFilter === 'all' || category === currentFilter) && modelName.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="store-card">
                            <div class="product-img-container" onclick="openLightbox(${i})">
                                <img src="cod${i}.jpeg" class="product-img" loading="lazy">
                            </div>
                            <div class="p-4">
                                <h3 class="text-xs font-bold text-slate-800 mb-1 uppercase">${modelName}</h3>
                                <p class="text-red-600 font-black text-lg mb-3">1000 EGP</p>
                                <button class="bg-emerald-500 text-white w-full py-2 rounded-lg font-black text-[12px]" onclick="addToCart('${modelName}')">اطلب الآن</button>
                            </div>
                        </div>`;
                }
            }
        }
        displayProducts();

        const reviewsWrapper = document.getElementById('reviews-wrapper');
        const reviewsText = ["خامة ممتازة جداً", "توصيل سريع", "جودة عالية", "أفضل براند", "موديلات تحفة", "مقاسات مظبوطة", "خدمة ممتازة", "تجربة رائعة", "DeSina الأفضل", "شغل احترافي", "بجد شكراً ليكم", "خامات مريحة", "أشيك موديلات", "5 نجوم", "الألوان زي الصورة", "سرعة في الرد", "تعامل راقي", "خامة شتوية روعة", "أحلى خامة صيفي", "دايماً متميزين"];
        for (let i = 0; i < 20; i++) {
            reviewsWrapper.innerHTML += `
                <div class="swiper-slide">
                    <div class="review-card">
                        <div class="star-gold">${'<i class="fas fa-star"></i>'.repeat(5)}</div>
                        <p class="font-bold text-slate-600 text-sm">"${reviewsText[i % 20]}"</p>
                        <h4 class="mt-3 text-red-600 font-black text-xs">عميل ${i+1}</h4>
                    </div>
                </div>`;
        }

        function setCategory(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts();
        }

        function openLightbox(i) { activeIdx = i; document.getElementById('lightbox-img').src = `cod${i}.jpeg`; document.getElementById('lightbox').style.display = 'flex'; document.body.style.overflow='hidden'; }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.body.style.overflow='auto'; }
        function changeImg(s) { activeIdx += s; if(activeIdx > totalModels) activeIdx=1; if(activeIdx < 1) activeIdx=totalModels; document.getElementById('lightbox-img').src = `cod${activeIdx}.jpeg`; }

        function toggleReviewModal(show) { document.getElementById('review-modal').style.display = show ? 'flex' : 'none'; }
        function submitReview() {
            const n = document.getElementById('revName').value, m = document.getElementById('revMsg').value;
            window.open(`https://wa.me/201001283311?text=${encodeURIComponent("الاسم: "+n+"\nالتقييم: "+m)}`, '_blank');
            toggleReviewModal(false);
        }

        let cart = [];
        function addToCart(n) { cart.push(n); const b = document.getElementById('cart-badge'); b.innerText = cart.length; b.style.display = 'block'; }
        function sendOrderToWhatsApp() {
            if (cart.length === 0) return alert("السلة فارغة");
            window.open(`https://wa.me/201001283311?text=${encodeURIComponent("طلب جديد:\n"+cart.join("\n"))}`, '_blank');
        }

        new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 3000 },
            pagination: { el: ".swiper-pagination", clickable: true },
            breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } }
        });

        let startX = 0;
        document.getElementById('lightbox').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('lightbox').addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) changeImg(1);
            if (startX - endX < -50) changeImg(-1);
        });
    </script>
</body>
</html>
