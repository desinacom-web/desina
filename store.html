<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ديسينا | DeSina Store</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; -webkit-user-select: none; user-select: none; scroll-behavior: smooth; }
        .store-card { background: white; border-radius: 20px; overflow: hidden; transition: 0.4s; border: 1px solid #eee; cursor: pointer; }
        .store-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .product-img-container { width: 100%; height: 200px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .buy-btn { background: #25d366; color: white; padding: 12px; border-radius: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; border: none; font-size: 15px; transition: 0.3s; }
        .buy-btn:hover { background: #128c7e; }

        /* Search & Filter */
        .search-container { max-width: 600px; margin: 20px auto 10px; position: relative; padding: 0 15px; }
        .search-input { width: 100%; padding: 12px 45px 12px 20px; border-radius: 50px; border: 2px solid #eee; outline: none; transition: 0.3s; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; background: white; border: 1px solid #ddd; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* Review Section Styling */
        .review-card { background: #ffffff; border-radius: 25px; padding: 30px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.3s; }
        .review-card:hover { transform: scale(1.02); }
        .add-review-btn { background: #ef4444; color: white; padding: 10px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3); }
        .add-review-btn:hover { transform: scale(1.05); background: #dc2626; }

        /* Modal Popup */
        #review-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10001; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 30px; position: relative; }
        .star-rating i { cursor: pointer; font-size: 24px; color: #ddd; transition: 0.2s; }
        .star-rating i.active { color: #facc15; }

        #lightbox { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); justify-content: center; align-items: center; }
        #lightbox.active { display: flex; }
        #lightbox-img { max-width: 90%; max-height: 75%; border-radius: 15px; object-fit: contain; }
        #toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: #10b981; color: white; padding: 10px 25px; border-radius: 50px; z-index: 9999; }
        #toast.active { display: block; }
    </style>
</head>
<body>

    <div id="toast">تم إضافة المنتج للسلة!</div>

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-600 font-bold flex items-center gap-2 hover:text-red-600 transition text-sm"><i class="fas fa-arrow-right"></i> الرئيسية</a>
                <img src="logo.jpg" style="height: 38px; border-radius: 8px;">
            </div>
            <div class="text-red-600 text-2xl relative cursor-pointer" onclick="sendOrderToWhatsApp()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-badge" class="bg-black text-white rounded-full px-2 py-0.5 text-[10px] absolute -top-2 -right-2 hidden">0</span>
            </div>
        </div>
    </nav>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن موديل معين..." onkeyup="displayProducts()">
        <i class="fas fa-search absolute right-8 top-1/2 -translate-y-1/2 text-gray-400"></i>
    </div>

    <div class="flex flex-wrap justify-center gap-3 mb-8 px-4">
        <button class="filter-btn active" onclick="setCategory('all', this)">كل الموديلات</button>
        <button class="filter-btn" onclick="setCategory('summer', this)">موديلات صيفية</button>
        <button class="filter-btn" onclick="setCategory('winter', this)">موديلات شتوية</button>
    </div>

    <div class="container mx-auto py-2 px-4">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 min-h-[300px]"></div>
    </div>

    <section class="bg-gray-50 py-20 px-4 border-t">
        <div class="container mx-auto">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-bold mb-4 text-gray-800">ماذا قالوا عن ديسينا؟ ⭐</h2>
                <button class="add-review-btn mt-4" onclick="toggleReviewModal(true)">أضف تقييمك الآن</button>
            </div>
            
            <div class="swiper mySwiper px-4">
                <div class="swiper-wrapper">
                    <div class="swiper-slide review-card text-center">
                        <div class="text-yellow-400 mb-4 text-lg"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        <p class="text-gray-600 italic">"الخامة ممتازة جداً والتوصيل كان سريع، فعلاً ديسينا براند محترم."</p>
                        <h4 class="mt-6 font-bold text-gray-900">- أحمد محمود</h4>
                    </div>
                    <div class="swiper-slide review-card text-center">
                        <div class="text-yellow-400 mb-4 text-lg"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        <p class="text-gray-600 italic">"التصميم شيك جداً وفي الحقيقة أحلى من الصور بكتير، جودة مشرفة."</p>
                        <h4 class="mt-6 font-bold text-gray-900">- سارة علي</h4>
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <div id="review-modal">
        <div class="modal-content">
            <i class="fas fa-times absolute left-6 top-6 text-gray-400 cursor-pointer" onclick="toggleReviewModal(false)"></i>
            <h3 class="text-2xl font-bold mb-6 text-center">تقييمك يهمنا ✍️</h3>
            <div class="space-y-4">
                <input type="text" id="revName" placeholder="اسمك الكريم" class="w-full border-2 p-3 rounded-2xl outline-none focus:border-red-500">
                <div class="star-rating flex justify-center gap-2 py-2" id="starContainer">
                    <i class="fas fa-star" data-val="1"></i><i class="fas fa-star" data-val="2"></i><i class="fas fa-star" data-val="3"></i><i class="fas fa-star" data-val="4"></i><i class="fas fa-star" data-val="5"></i>
                </div>
                <textarea id="revMsg" placeholder="ما هو رأيك في منتجاتنا؟" class="w-full border-2 p-3 rounded-2xl outline-none focus:border-red-500 h-24"></textarea>
                <button onclick="submitReview()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold">إرسال التقييم عبر واتساب</button>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const totalModels = 11;
        const productPrice = "1000 EGP";
        const phoneNumber = "201001283311";
        const grid = document.getElementById('product-grid');
        let currentFilter = 'all';

        function displayProducts() {
            grid.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            for (let i = 1; i <= totalModels; i++) {
                const modelName = `موديل COD-${i < 10 ? '0' + i : i}`;
                const category = (i % 2 === 0) ? 'winter' : 'summer';
                if ((currentFilter === 'all' || category === currentFilter) && modelName.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="store-card product-item" onclick="openLightbox('cod${i}.jpeg')">
                            <div class="product-img-container"><img src="cod${i}.jpeg" class="product-img"></div>
                            <div class="p-4 text-right">
                                <h3 class="text-xs md:text-sm font-bold text-gray-800 mb-1">${modelName}</h3>
                                <p class="text-red-600 font-extrabold text-lg mb-4">${productPrice}</p>
                                <button class="buy-btn" onclick="addToCart('${modelName}', event)"><i class="fas fa-shopping-cart"></i> اطلب الآن</button>
                            </div>
                        </div>`;
                }
            }
        }
        displayProducts();

        function setCategory(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts();
        }

        let cartItems = [];
        function addToCart(name, e) {
            e.stopPropagation();
            cartItems.push(name);
            document.getElementById('cart-badge').innerText = cartItems.length;
            document.getElementById('cart-badge').style.display = 'block';
            const t = document.getElementById('toast');
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2000);
        }

        function sendOrderToWhatsApp() {
            if (cartItems.length === 0) return alert("السلة فاضية!");
            const id = "DS-" + Math.floor(1000 + Math.random() * 9000);
            let msg = `طلب جديد: ${id}\n----------\n` + cartItems.join("\n");
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            cartItems = []; document.getElementById('cart-badge').style.display = 'none';
        }

        // Review System
        let selectedStars = 5;
        function toggleReviewModal(show) { document.getElementById('review-modal').style.display = show ? 'flex' : 'none'; }
        
        document.querySelectorAll('#starContainer i').forEach(star => {
            star.onclick = function() {
                selectedStars = this.getAttribute('data-val');
                document.querySelectorAll('#starContainer i').forEach((s, idx) => {
                    s.classList.toggle('active', idx < selectedStars);
                });
            }
        });

        function submitReview() {
            const name = document.getElementById('revName').value;
            const msg = document.getElementById('revMsg').value;
            if (!name || !msg) return alert("من فضلك اكمل البيانات");
            let finalMsg = `تقييم جديد من عميل ⭐\nالاسم: ${name}\nالتقييم: ${selectedStars} نجوم\nالرأي: ${msg}`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(finalMsg)}`, '_blank');
            toggleReviewModal(false);
        }

        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('active'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        new Swiper(".mySwiper", { slidesPerView: 1, spaceBetween: 20, loop: true, autoplay: { delay: 3000 }, pagination: { el: ".swiper-pagination", clickable: true }, breakpoints: { 768: { slidesPerView: 3 } } });
    </script>
</body>
</html>
