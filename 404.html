<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina | نظام التوجيه الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; overflow: hidden; }
        .glitch { text-shadow: 3px 3px #ff0000; animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
        .bg-gradient-red { background: linear-gradient(45deg, #ff0000, #8b0000); }
        .loader { border: 3px solid #1a1a1a; border-top: 3px solid #ff0000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <script>
        (function() {
            var currentUrl = window.location.href;
            var currentPath = window.location.pathname;
            var fileName = currentPath.split('/').pop();
            var needsRedirect = false;
            var newUrl = currentUrl;

            // 1. ذكاء معالجة اسم المجلد (desina -> DeSina)
            if (newUrl.includes("/desina/")) {
                newUrl = newUrl.replace("/desina/", "/DeSina/");
                needsRedirect = true;
            }

            // 2. ذكاء معالجة كافة صفحات الموقع (Small -> Capital)
            var pagesMap = {
                "index.html": "index.html",
                "store.html": "Store.html",
                "services.html": "Services.html",
                "content-creation.html": "Content-Creation.html",
                "furniture.html": "Furniture.html",
                "clothing.html": "Clothing.html",
                "accessories.html": "Accessories.html",
                "about.html": "About.html",
                "contact.html": "Contact.html"
            };

            var correctFileName = pagesMap[fileName.toLowerCase()];
            if (correctFileName && fileName !== correctFileName) {
                newUrl = newUrl.replace(fileName, correctFileName);
                needsRedirect = true;
            }

            // تنفيذ التحويل اللحظي لو فيه أي خطأ مكتشف
            if (needsRedirect) {
                window.location.replace(newUrl);
            }
        })();
    </script>

    <div class="text-center px-4">
        <h1 class="text-9xl font-bold glitch text-red-600 mb-4 italic">404</h1>
        <h2 class="text-2xl md:text-3xl font-bold mb-6">نأسف.. هذا الرابط خارج نطاق التغطية</h2>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">لقد قمنا بتحديث عالم ديسينا، الرابط الذي تحاول الوصول إليه قديم أو مكتوب بشكل غير صحيح.</p>
        
        <div class="flex flex-col md:flex-row gap-4 justify-center mb-12">
            <a href="index.html" class="bg-gradient-red hover:scale-105 transition-transform px-10 py-3 rounded-full font-bold flex items-center justify-center gap-2 shadow-lg shadow-red-900/20">
                <i class="fas fa-home"></i> العودة للرئيسية
            </a>
            <a href="Store.html" class="border border-red-600 hover:bg-red-600 transition-colors px-10 py-3 rounded-full font-bold flex items-center justify-center gap-2">
                <i class="fas fa-shopping-bag"></i> زيارة المتجر
            </a>
        </div>

        <div class="pt-10 border-t border-white/5 opacity-40">
            <p class="text-xs mb-6 tracking-widest text-red-500 font-bold uppercase">DeSina Creative Partners</p>
            <div class="flex justify-center items-center gap-10 grayscale hover:grayscale-0 transition-all duration-700">
                <i class="fab fa-spotify text-3xl"></i>
                <i class="fas fa-play text-2xl"></i> <i class="fab fa-apple text-3xl"></i>
                <i class="fab fa-google-play text-2xl"></i>
            </div>
        </div>
    </div>

</body>
</html>
