<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
        (function() {
            var currentUrl = window.location.href;
            // فحص لو المسار يحتوي على desina بسمول، يحوله فوراً لـ DeSina كابيتال
            if (currentUrl.includes("/desina/")) {
                var newUrl = currentUrl.replace("/desina/", "/DeSina/");
                window.location.replace(newUrl);
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الرابط خارج التغطية | DeSina</title>
    <meta name="description" content="عذراً، يبدو أنك سلكت طريقاً خاطئاً في عالم ديسينا. لا تقلق، نظام التوجيه الذكي سيعيدك فوراً.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; overflow: hidden; }
        .glitch { text-shadow: 3px 3px #ff0000; animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
        .bg-gradient-red { background: linear-gradient(45deg, #ff0000, #8b0000); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <script>
        (function() {
            var currentPath = window.location.pathname;
            var fileName = currentPath.split('/').pop();
            
            // قاموس ديسينا المفلتر بناءً على ملفات الخزنة الفعلية
            var pagesMap = {
                "index.html": "en.html",            // الرئيسية الإنجليزية
                "store.html": "en-store.html",      // المتجر
                "about.html": "en-about.html",      // عن ديسينا
                "catalog.html": "en-catalog.html",  // الكتالوج
                "content.html": "en-content.html",  // المحتوى
                "account.html": "en-account.html",  // الحساب
                "team.html": "en-team.html",        // الفريق
                "vip.html": "en-vip-ads.html",      // الإعلانات المميزة
                "vip-ads.html": "en-vip-ads.html",
                "en-vip.html": "en-vip-ads.html",
                "privacy.html": "policy.html",      // الملف الذكي للخصوصية
                "privacy-policy.html": "policy.html",
                "about-us.html": "en-about.html"
            };

            var correctFileName = pagesMap[fileName.toLowerCase()];
            
            if (correctFileName && fileName !== correctFileName) {
                var newPath = window.location.href.replace(fileName, correctFileName);
                window.location.replace(newPath);
            }
        })();
    </script>

    <div class="text-center">
        <h1 class="text-9xl font-bold glitch">404</h1>
        <p class="text-2xl mt-4">عذراً، ديسينا لا تجد هذا الملف في خزنتها!</p>
        <a href="en.html" class="mt-6 inline-block px-8 py-3 bg-gradient-red rounded-full text-lg font-bold">العودة للرئيسية</a>
    </div>

</body>
</html>
