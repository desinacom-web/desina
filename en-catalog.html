<html lang="en" dir="ltr">
<head>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=790032697153678&ev=PageView&noscript=1"
    /></noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>DeSina | Official Global Catalog</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-main: #f9fafb; --bg-card: #ffffff; --text-main: #1f2937; --nav-bg: #ffffff; --btn-text: #374151; }
        @media (prefers-color-scheme: dark) {
            :root { --bg-main: #0a0c10; --bg-card: #161b22; --text-main: #f3f4f6; --border-color: #30363d; --nav-bg: #111111; --btn-text: #e5e7eb; }
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.4s; }
        nav { background-color: var(--nav-bg) !important; border-bottom: 1px solid rgba(239, 68, 68, 0.1); }
        .filter-btn { transition: 0.3s; padding: 10px 24px; border-radius: 99px; font-weight: bold; border: 1px solid rgba(156, 163, 175, 0.3); color: var(--btn-text); cursor: pointer; }
        .active-filter { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .filter-item { display: none; }
        .show { display: block !important; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .catalog-card { background-color: var(--bg-card); border-radius: 1.5rem; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-top: 4px solid #ef4444; transition: 0.3s; }
        @media (prefers-color-scheme: dark) {
            header.bg-gray-900 { background-color: #000 !important; }
            .bg-white { background-color: var(--bg-card) !important; }
        }
        * { font-style: normal !important; }

        /* Modified Slim Language Switcher for Android & Windows */
        .lang-switch {
            background: linear-gradient(45deg, #ef4444, #000);
            color: white !important;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            line-height: 1;
            text-decoration: none !important;
            white-space: nowrap; /* يمنع الزرار من الانقسام */
        }
        @media (max-width: 640px) {
            .lang-switch { padding: 3px 8px; font-size: 11px; } /* تصغير إضافي للموبايل */
        }
        .lang-switch:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>
    <nav class="p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2 md:px-4">
            <div class="flex items-center gap-2 md:gap-4">
                <a href="en.html">
                    <img src="logo.jpg" class="h-8 md:h-10 rounded-lg" alt="DeSina Logo">
                </a>
                <span class="text-lg md:text-xl font-bold">DeSina</span>
            </div>
            <div class="flex gap-2 md:gap-4 items-center">
                <a href="en.html" class="font-bold hover:text-red-600 hidden sm:inline text-sm">Home</a>
                
                <a href="catalog.html" class="lang-switch">
                    <i class="fas fa-globe"></i> <span>العربية</span>
                </a>
            </div>
        </div>
    </nav>
    <header class="bg-gray-900 py-16 text-center text-white px-4">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4">DeSina <span class="text-red-600">Catalog</span></h1>
        <p class="text-gray-400">Discover our latest premium fashion collections and professional global services.</p>
    </header>
    <div class="flex flex-wrap justify-center gap-4 py-10 shadow-sm transition-colors" style="background-color: var(--bg-card);">
        <button onclick="filterSelection('all', this)" class="filter-btn" id="btn-all">All</button>
        <button onclick="filterSelection('fashion', this)" class="filter-btn" id="btn-fashion">Fashion</button>
        <button onclick="filterSelection('digital', this)" class="filter-btn">Digital Services</button>
        <button onclick="filterSelection('industrial', this)" class="filter-btn">Industrial Services</button>
    </div>
    <main class="container mx-auto px-6 py-16">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <article class="filter-item fashion catalog-card p-4 show">
                <img src="cod1.jpeg" class="w-full h-80 object-cover rounded-xl mb-4">
                <h3 class="text-center font-bold text-xl">Youth Model COD-01</h3>
            </article>
            </div>
    </main>
    <footer class="bg-gray-950 text-white py-16 px-6 text-center border-t border-gray-800">
        <p class="text-red-600 text-font-bold">All Rights Reserved | DeSina Group©2026</p>
    </footer>
    <script>
        function filterSelection(c, btn) {
          var x, i, btns;
          x = document.getElementsByClassName("filter-item");
          btns = document.getElementsByClassName("filter-btn");
          if (c == "all") c = "";
          for (i = 0; i < btns.length; i++) { btns[i].classList.remove("active-filter"); }
          if(btn) btn.classList.add("active-filter");
          for (i = 0; i < x.length; i++) {
            x[i].classList.remove("show");
            if (x[i].className.indexOf(c) > -1) x[i].classList.add("show");
          }
        }
        window.onload = function() { filterSelection('all', document.getElementById('btn-all')); };
    </script>
</body>
</html>
