<!-- نفس ملفك بالكامل بدون أي تغيير في التصميم -->

<!-- 🔐 تم حذف كود Google AI القديم بالكامل -->

<script>
window.toggleDeSina = () => {
    const box = document.getElementById('desina-chat-box');
    box.style.display = box.style.display === 'none' ? 'flex' : 'none';
};

window.callDeSina = async () => {
    const input = document.getElementById("desina-input");
    const msgDiv = document.getElementById("desina-messages");
    const text = input.value.trim();
    if (!text) return;

    msgDiv.innerHTML += `<div class="msg-user">${text}</div>`;
    input.value = "";
    msgDiv.scrollTop = msgDiv.scrollHeight;

    try {
        const res = await fetch("https://YOUR_BACKEND_URL/api/ai", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        msgDiv.innerHTML += `<div class="msg-ai">${data.reply}</div>`;
    } catch (e) {
        msgDiv.innerHTML += `<div class="msg-ai">ديسينا تعتذر، حدث خطأ في الاتصال.</div>`;
    }

    msgDiv.scrollTop = msgDiv.scrollHeight;
};

document.getElementById("desina-input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") callDeSina();
});
</script>
