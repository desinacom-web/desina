<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتالوج ديسينا | DeSina Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        /* التعديل الجذري: الصورة تظهر كاملة وبمقاس متناسق وشيك */
        .cat-img { 
            width: auto; /* العرض تلقائي */
            max-width: 100%; /* العرض الأقصى 100% من الكارد */
            height: auto; /* الارتفاع تلقائي (بيحافظ على الأبعاد) */
            max-height: 200px; /* الارتفاع الأقصى 200px (عشان ما تطولش أوي) */
            display: block; /* عشان المسافات تتظبط */
            margin: 0 auto; /* توسيط الصورة في الكارد */
            border-radius: 10px; /* حواف مدورة بسيطة وشيك */
            transition: 0.4s;
        }
        @media (min-width: 768px) { .cat-img { max-height: 250px; } } /* ارتفاع أقصى أكبر في الكمبيوتر */
        
        .cat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 py-10 px-6">
    <div class="container mx-auto text-center">
        <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-4 italic">DeSina Catalog 2026</h1>
        <p class="text-gray-600 mb-12 text-lg italic font-bold">الأناقة والماركة الأصلية في كل قطعة</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 1.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 1</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 2.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 2</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 3.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 3</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 4.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 4</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 5.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 5</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 6.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 6</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 7.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 7</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 8.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 8</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 9.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 9</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 10.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 10</h3></div>
            <div class="bg-white p-3 rounded-2xl shadow-md cat-card"><img src="cod 11.jpeg" class="cat-img mb-3 shadow-sm"><h3 class="font-bold text-xl text-gray-800 italic">Model 11</h3></div>
        </div>
        
        <a href="index.html" class="mt-16 inline-block bg-gray-900 text-white px-10 py-3 rounded-full font-bold text-lg shadow-xl hover:bg-red-700 transition">العودة للرئيسية</a>
    </div>
</body>
</html>
