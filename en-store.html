<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina Store | Official</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fcfcfc; scroll-behavior: smooth; }
        h1, h2, h3, .buy-btn, .filter-btn { font-weight: 900 !important; }
        
        .store-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        .store-card:hover { border-color: #ef4444; transform: translateY(-5px); }
        
        .product-img-container { width: 100%; height: 320px; overflow: hidden; background: #f3f4f6; cursor: zoom-in; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        .buy-btn { background: #111827; color: white; padding: 14px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; }
        .buy-btn:hover { background: #ef4444; }

        .filter-btn { padding: 8px 25px; border-radius: 50px; background: white; border: 2px solid #eee; font-weight: 800; transition: 0.3s; }
        .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* Lightbox - نظام عرض الصور الاحترافي */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; user-select: none; }
        #lightbox-img { max-width: 90%; max-height: 85vh; border-radius: 12px; object-fit: contain; }
        .lb-close { position: absolute; top: 25px; right: 30px; color: white; font-size: 40px; cursor: pointer; transition: 0.3s; }
        .lb-close:hover { color: #ef4444; }
        .lb-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 45px; cursor: pointer; padding: 20px; opacity: 0.5; transition: 0.3s; }
        .lb-arrow:hover { opacity: 1; color: #ef4444; }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }

        .star-gold { color: #FFD700; }
    </style>
</head>
<body>

    <div id="lightbox">
        <span class="lb-close" onclick="closeLightbox()">&times;</span>
        <i class="fas fa-chevron-left lb-arrow lb-prev" onclick="changeImg(-1)"></i>
        <i class="fas fa-chevron-right lb-arrow lb-next" onclick="changeImg(1)"></i>
        <img id="lightbox-img" src="">
    </div>

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-4">
                <img src="logo.jpg" style="height: 40px; border-radius: 10px;">
                <a href="en.html" class="text-gray-900 font-black flex items-center gap-2 hover:text-red-600 transition text-sm">HOME <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="flex items-center gap-5">
                <a href="store.html" class="text-blue-600 font-black text-xs hover:underline">عربي</a>
                <div class="text-red-600 text-2xl relative cursor-pointer" onclick="sendOrderToWhatsApp()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-badge" class="bg-black text-white rounded-full px-2 py-0.5 text-[10px] absolute -top-2 -right-2 hidden">0</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-16 text-center">
        <h1 class="text-5xl md:text-7xl text-gray-900 uppercase italic"><span class="text-red-600">DeSina</span> Store</h1>
        <p class="text-gray-500 font-bold mt-2 uppercase tracking-widest">Premium Fashion Experience</p>
    </header>

    <div class="flex flex-wrap justify-center gap-4 mb-12 px-4">
        <button class="filter-btn active" onclick="setCategory('all', this)">All Collections</button>
        <button class="filter-btn" onclick="setCategory('summer', this)">Summer ☀️</button>
        <button class="filter-btn" onclick="setCategory('winter', this)">Winter ❄️</button>
    </div>

    <div class="container mx-auto px-4 mb-24">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        const totalModels = 11;
        const phoneNumber = "201001283311";
        const grid = document.getElementById('product-grid');
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        let currentFilter = 'all';
        let activeImgIndex = 1;

        function displayProducts() {
            grid.innerHTML = "";
            for (let i = 1; i <= totalModels; i++) {
                const modelName = `Model COD-${i < 10 ? '0' + i : i}`;
                const category = (i % 2 === 0) ? 'winter' : 'summer';
                if (currentFilter === 'all' || category === currentFilter) {
                    grid.innerHTML += `
                        <div class="store-card">
                            <div class="product-img-container" onclick="openLightbox(${i})">
                                <img src="cod${i}.jpeg" class="product-img" loading="lazy">
                            </div>
                            <div class="p-6">
                                <h3 class="text-xl text-gray-900 mb-1">${modelName}</h3>
                                <p class="text-red-600 font-black text-2xl mb-5">1000 EGP</p>
                                <button class="buy-btn" onclick="addToCart('${modelName}')">
                                    <i class="fas fa-cart-plus"></i> ADD TO CART
                                </button>
                            </div>
                        </div>`;
                }
            }
        }
        displayProducts();

        function setCategory(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts();
        }

        // Lightbox Logic
        function openLightbox(index) {
            activeImgIndex = index;
            lbImg.src = `cod${index}.jpeg`;
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lb.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function changeImg(step) {
            activeImgIndex += step;
            if (activeImgIndex > totalModels) activeImgIndex = 1;
            if (activeImgIndex < 1) activeImgIndex = totalModels;
            lbImg.src = `cod${activeImgIndex}.jpeg`;
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (lb.style.display === 'flex') {
                if (e.key === "ArrowRight") changeImg(1);
                if (e.key === "ArrowLeft") changeImg(-1);
                if (e.key === "Escape") closeLightbox();
            }
        });

        // Cart Logic
        let cartItems = [];
        function addToCart(name) {
            cartItems.push(name);
            const badge = document.getElementById('cart-badge');
            badge.innerText = cartItems.length;
            badge.style.display = 'block';
            alert("Added to cart: " + name);
        }

        function sendOrderToWhatsApp() {
            if (cartItems.length === 0) return alert("Cart is empty!");
            let msg = `DeSina Order 🚀\n` + cartItems.join("\n");
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
