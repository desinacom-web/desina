<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://connect.facebook.net https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://www.facebook.com https://api.qrserver.com; connect-src 'self' https://www.facebook.com;">
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=790032697153678&ev=PageView&noscript=1"
    /></noscript>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Language" content="en">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="DeSina Store | Premium Collection: Your premier global destination for high-quality fashion, summer and winter collections. Experience elegance and professional clothing at its best.">
    <meta name="keywords" content="DeSina Store, Online Shopping, Premium Fashion, Winter Collection, Summer Collection, Fashion Egypt, DeSina Models">
    <title>DeSina Store | Premium Online Shopping Experience</title>
    <link rel="alternate" hreflang="ar" href="https://desinacom-web.github.io/desina/store.html">
    <link rel="alternate" hreflang="en" href="https://desinacom-web.github.io/desina/en-store.html">
    <link rel="alternate" hreflang="x-default" href="https://desinacom-web.github.io/desina/store.html">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --bg-body: #fcfcfc; --bg-card: white; --text-main: #0f172a; --border-color: #f1f5f9; --nav-bg: white; }
        @media (prefers-color-scheme: dark) {
            :root { --bg-body: #0a0c10; --bg-card: #161b22; --text-main: #f3f4f6; --border-color: #30363d; --nav-bg: #111111; }
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-body); color: var(--text-main); scroll-behavior: smooth; font-style: normal !important; transition: background-color 0.4s, color 0.4s; }
        * { font-style: normal !important; text-transform: none !important; }
        nav { background-color: var(--nav-bg) !important; border-bottom: 1px solid var(--border-color); }
        .nav-link { font-weight: 900 !important; font-size: 14px !important; color: var(--text-main) !important; }
        .hero-section { background-color: #0f172a; padding: 30px 20px 50px; text-align: center; }
        .brand-text { font-weight: 900 !important; letter-spacing: -1.5px; font-size: 3.2rem; color: white; line-height: 1; }
        .brand-red { color: #ef4444; }
        .search-bar { background-color: var(--bg-card); color: var(--text-main); width: 100%; padding: 15px 25px 15px 55px; border-radius: 50px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1); outline: none; font-weight: 700; }
        .search-container { max-width: 600px; margin: -28px auto 25px; padding: 0 20px; position: relative; z-index: 10; }
        .search-icon { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .filter-btn { padding: 8px 25px; border-radius: 50px; background: var(--bg-card); border: 2px solid var(--border-color); font-weight: 800; font-size: 13px; transition: 0.3s; color: var(--text-main); }
        .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
        .store-card { background: var(--bg-card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.3s; text-align: center; }
        .product-img-container { width: 100%; height: 180px; overflow: hidden; background: #111; cursor: zoom-in; position: relative; }
        @media (min-width: 768px) { .product-img-container { height: 320px; } }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s ease; }
        .review-card { background: var(--bg-card); border-radius: 25px; padding: 30px; border: 1px solid var(--border-color); margin: 10px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .star-gold { color: #fbbf24; font-size: 18px; margin-bottom: 8px; }
        .review-btn { background: #ef4444; color: white; padding: 12px 35px; border-radius: 50px; font-weight: 900; font-size: 15px; margin-bottom: 30px; transition: 0.3s; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }
        .btn-order { background-color: #22c55e; color: white; width: 100%; padding: 10px; border-radius: 12px; font-weight: 900; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; }
        #lightbox-img { max-width: 90%; max-height: 80vh; border-radius: 12px; }
        #review-modal .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); }
        #revName, #revMsg { background: var(--bg-body); color: var(--text-main); border-color: var(--border-color); }
    </style>
</head>
<body>
    <div id="lightbox">
        <span class="lb-close text-white absolute top-6 right-6 text-4xl cursor-pointer" onclick="closeLightbox()">&times;</span>
        <i class="fas fa-chevron-left text-white absolute top-1/2 left-4 text-4xl cursor-pointer p-4" onclick="changeImg(-1)"></i>
        <i class="fas fa-chevron-right text-white absolute top-1/2 right-4 text-4xl cursor-pointer p-4" onclick="changeImg(1)"></i>
        <img id="lightbox-img" src="" alt="Enlarged Product View - DeSina Store">
    </div>
    <nav class="p-4 sticky top-0 z-50 transition-colors">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-4">
                <a href="en.html" aria-label="Home">
                    <img src="logo.jpg" style="height: 38px; border-radius: 8px; cursor: pointer;" alt="DeSina Logo">
                </a>
                <a href="en.html" class="nav-link">HOME</a>
            </div>
            <div class="flex items-center gap-6">
                <a href="store.html" class="nav-link text-blue-600">عربي</a>
                <div class="text-red-600 text-2xl relative cursor-pointer" onclick="sendOrderToWhatsApp()" aria-label="Shopping Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-badge" class="bg-black text-white rounded-full px-2 py-0.5 text-[9px] absolute -top-2 -right-2 hidden">0</span>
                </div>
            </div>
        </div>
    </nav>
    <header class="hero-section">
        <h1 class="brand-text"><span class="brand-red">DeSina</span> Store</h1>
        <p class="text-slate-400 font-bold text-[10px] tracking-[0.4em] mt-3 uppercase">Premium Global Experience</p>
    </header>
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-bar" placeholder="Find your exclusive model..." onkeyup="displayProducts()">
    </div>
    <div class="flex flex-wrap justify-center gap-2 mb-10 px-4">
        <button class="filter-btn active" onclick="setCategory('all', this)">All Models</button>
        <button class="filter-btn" onclick="setCategory('summer', this)">Summer ☀️</button>
        <button class="filter-btn" onclick="setCategory('winter', this)">Winter ❄️</button>
    </div>
    <main class="container mx-auto px-4 mb-24">
        <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8"></div>
    </main>
    <section class="py-16 px-4 border-t border-gray-100 dark:border-gray-800 transition-colors">
        <div class="container mx-auto max-w-5xl text-center">
            <h2 class="text-3xl md:text-5xl font-black mb-8">What clients say about <span class="brand-red">DeSina</span>⭐</h2>
            <button class="review-btn" onclick="toggleReviewModal(true)">Share Your Experience</button>
            <div class="swiper mySwiper">
                <div id="reviews-wrapper" class="swiper-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>
    <div id="review-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:20000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div class="modal-content" style="width:90%; max-width:400px; padding:30px; border-radius:25px; position:relative;">
            <i class="fas fa-times absolute right-6 top-6 text-gray-400 cursor-pointer text-xl" onclick="toggleReviewModal(false)"></i>
            <h3 class="text-xl font-black mb-6 text-center">SUBMIT REVIEW</h3>
            <input type="text" id="revName" placeholder="Full Name" class="w-full p-3 rounded-xl mb-4 font-bold outline-none border">
            <textarea id="revMsg" placeholder="Your experience..." class="w-full p-3 rounded-xl h-24 mb-4 font-bold outline-none border"></textarea>
            <button onclick="submitReview()" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black">SEND VIA WHATSAPP</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const totalModels = 11;
        const grid = document.getElementById('product-grid');
        let currentFilter = 'all', activeIdx = 1;
        function displayProducts() {
            grid.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            for (let i = 1; i <= totalModels; i++) {
                const modelName = `Model COD-${i < 10 ? '0'+i : i}`;
                const category = (i % 2 === 0) ? 'winter' : 'summer';
                if ((currentFilter === 'all' || category === currentFilter) && modelName.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="store-card">
                            <div class="product-img-container" onclick="openLightbox(${i})">
                                <img src="cod${i}.jpeg" class="product-img" loading="lazy" alt="DeSina ${modelName}">
                            </div>
                            <div class="p-4">
                                <h3 class="text-xs font-bold mb-1 uppercase">${modelName}</h3>
                                <p class="text-red-600 font-black text-lg mb-3">1000 EGP</p>
                                <button class="btn-order" onclick="addToCart('${modelName}')">
                                    ORDER NOW <i class="fas fa-shopping-cart"></i>
                                </button>
                            </div>
                        </div>`;
                }
            }
        }
        displayProducts();
        const reviewsWrapper = document.getElementById('reviews-wrapper');
        const reviewsText = ["Excellent!", "Fast delivery", "High Quality", "Great Material", "Best brand", "Loved it!", "Perfect fit", "Good service", "Amazing experience", "DeSina is Top", "Professional", "Highly recommended", "Unique styles", "5 Stars!", "Very comfortable", "Nice colors", "My favorite shop", "So elegant", "Best quality", "Super fast"];
        for (let i = 0; i < 20; i++) {
            reviewsWrapper.innerHTML += `<div class="swiper-slide"><div class="review-card"><div class="star-gold">${'<i class="fas fa-star"></i>'.repeat(5)}</div><p class="font-bold opacity-80 text-sm">"${reviewsText[i % 20]}"</p><h4 class="mt-3 text-red-600 font-black text-xs">Client ${i+1}</h4></div></div>`;
        }
        function setCategory(cat, btn) { currentFilter = cat; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); displayProducts(); }
        function openLightbox(i) { activeIdx = i; document.getElementById('lightbox-img').src = `cod${i}.jpeg`; document.getElementById('lightbox').style.display = 'flex'; document.body.style.overflow='hidden'; }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.body.style.overflow='auto'; }
        function changeImg(s) { activeIdx += s; if(activeIdx > totalModels) activeIdx=1; if(activeIdx < 1) activeIdx=totalModels; document.getElementById('lightbox-img').src = `cod${activeIdx}.jpeg`; }
        function toggleReviewModal(show) { document.getElementById('review-modal').style.display = show ? 'flex' : 'none'; }
        function submitReview() { const n = document.getElementById('revName').value, m = document.getElementById('revMsg').value; window.open(`https://wa.me/201102919214?text=${encodeURIComponent("Review: "+m+"\nBy: "+n)}`, '_blank'); toggleReviewModal(false); }
        let cart = [];
        function addToCart(n) { cart.push(n); const b = document.getElementById('cart-badge'); b.innerText = cart.length; b.style.display = 'block'; fbq('track', 'AddToCart', {content_name: n}); }
        function sendOrderToWhatsApp() {
            if (cart.length === 0) return alert("Cart empty");
            const orderNumber = "DS-" + Math.floor(1000 + Math.random() * 9000);
            let orderDetails = "🚀 New Order from DeSina\nOrder ID: " + orderNumber + "\n--------------------------\n";
            cart.forEach((item, index) => { orderDetails += `${index + 1}- ${item}\n`; });
            orderDetails += "--------------------------\nProcessing your order..";
            fbq('track', 'Purchase', {value: cart.length * 1000, currency: 'EGP'});
            window.open(`https://wa.me/201102919214?text=${encodeURIComponent(orderDetails)}`, '_blank');
        }
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 3000 }, pagination: { el: ".swiper-pagination", clickable: true }, breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } } });
    </script>
</body>
</html>
