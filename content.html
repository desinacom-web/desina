<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>أعمال صناعة المحتوى | DeSina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0c10; color: white; min-height: 100vh; }
        .content-card { background: #161b22; border-top: 4px solid #ef4444; transition: 0.3s; height: 100%; }
        .content-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }
        /* حاوية مشغل أنغامي لضمان التناسب */
        .anghami-container { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .anghami-container iframe { width: 100% !important; height: 450px !important; border: none; }
    </style>
</head>
<body>

    <nav class="p-4 bg-black/80 sticky top-0 z-50 backdrop-blur-md border-b border-gray-800">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="text-white font-bold flex items-center gap-2 hover:text-red-600 transition">
                <i class="fas fa-chevron-right"></i> العودة للرئيسية
            </a>
            <img src="logo.jpg" style="height: 35px; border-radius: 5px;">
        </div>
    </nav>

    <header class="py-16 text-center px-4">
        <h1 class="text-4xl md:text-6xl font-extrabold text-red-600 mb-4">صناعة المحتوى</h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto italic">"إبداع بلا حدود، من الفكرة حتى التنفيذ."</p>
    </header>

    <main class="container mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <div class="p-8 rounded-3xl content-card shadow-2xl">
                <div class="flex items-center gap-4 mb-8">
                    <i class="fas fa-headphones-alt text-4xl text-red-600"></i>
                    <div>
                        <h3 class="text-2xl font-bold">الإنتاج الصوتي</h3>
                        <p class="text-gray-500 text-sm">استمع إلى أعمالنا على أنغامي</p>
                    </div>
                </div>

                <div class="anghami-container">
                    <iframe src="https://widget.anghami.com/playlist/252198952/?theme=fulldark&layout=list&lang=en" scrolling="no" frameborder="0" height="250"></iframe>
                </div>
            </div>

            <div class="p-8 rounded-3xl content-card shadow-2xl flex flex-col justify-between">
                <div class="flex items-center gap-4 mb-8">
                    <i class="fas fa-film text-4xl text-red-600"></i>
                    <div>
                        <h3 class="text-2xl font-bold">الإنتاج المرئي</h3>
                        <p class="text-gray-500 text-sm">سينمائية في كل تفصيلة</p>
                    </div>
                </div>
                <div class="bg-black/60 border-2 border-dashed border-gray-700 h-[250px] rounded-2xl flex flex-col items-center justify-center gap-4 text-center p-4">
                    <i class="fas fa-play-circle text-6xl text-gray-700 animate-pulse"></i>
                    <p class="text-gray-500 font-bold text-xl">معرض الفيديوهات قيد التجهيز..</p>
                    <p class="text-gray-600 text-sm">قريباً سيتم عرض أحدث أعمال المونتاج هنا</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-10 text-center border-t border-gray-900 mt-10">
        <p class="text-red-600 text-sm">DeSina Creative © 2026</p>
    </footer>

</body>
</html>
